<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Page</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background: #f5f5f5; }
.sidebar { min-height: 100%; border-right: 1px solid #eee; }
.profile-pic {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: #ddd;
}
a{
    text-decoration: none;
    color: black;
}
</style>
</head>
<body>

<div class="container mt-5">
  <div class="row bg-white rounded shadow-sm">
    
    <!-- Sidebar -->
    <div class="col-md-3 p-4 sidebar">
      <h5 class="mb-4">Account</h5>
      <ul class="list-unstyled">
        <li class="mb-2">Profile</li>
        <li class="mb-2"><a href="reservations.html" >My reservations</a></li>
        <li class="mb-2"> <a href="saved.html">Saved</a></li>
        <li class="mb-2">Verification Dashboard</li>
        <li class="text-danger">Log out</li>
      </ul>
    </div>

    <!-- Content -->
    <div class="col-md-9 p-4">
      <h4 class="mb-4">Personal information</h4>

      <div class="d-flex align-items-center mb-3">
        <div class="profile-pic me-3"></div>
        <button class="btn btn-success rounded-pill">Upload</button>
      </div>

      <input type="text" class="form-control rounded-pill mb-3" placeholder="Your name">
      <input type="text" class="form-control rounded-pill mb-3" placeholder="Gender">
      <input type="date" class="form-control rounded-pill mb-3">

      <h6>Phone number</h6>
      <p>+201XXXXXXXXX</p>

      <h6>Email for newsletters</h6>
      <input type="email" class="form-control rounded-pill mb-3" placeholder="Email">

      <h6 class="text-danger">Delete my account</h6>
      <button class="btn btn-danger mb-3">Delete</button>

      <button class="btn btn-success w-100 rounded-pill">Save changes</button>
    </div>

  </div>
</div>

</body>
</html>
